# version: '3'

services:  
  db:
    container_name: postgres_db
    image: postgres:14.3
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
        driver: local